name: Deploy automático

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Enviar para servidor
        uses: appleboy/scp-action@master
        with:
          host: 18.188.214.2
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "index.html"
          target: "/var/www/html"
